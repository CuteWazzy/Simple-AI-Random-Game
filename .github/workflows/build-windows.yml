name: Build Windows EXE

# 触发条件：推送 tag (v*) 或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy matplotlib pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --name ai_game `
            --add-data "scripts;scripts" `
            --add-data "models/model.pt;." `
            --add-data "models/genetic_model.pt;." `
            --hidden-import torch `
            --collect-all torch `
            --collect-all numpy `
            ai_game.py

      - name: Test EXE
        shell: pwsh
        run: |
          .\dist\ai_game.exe stats

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai_game-windows-exe
          path: dist/ai_game.exe
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai_game.exe
          name: Release ${{ github.ref_name }}
